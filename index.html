      <div class="field"><label>Nome completo</label><input id="uf_nome" value="${esc(u.nome)}"></div>
      <div class="frow"><div class="field"><label>Usuário (login)</label><input id="uf_usuario" value="${esc(u.usuario)}" placeholder="ex.: maria.silva"></div>
      <div class="field"><label>Perfil de acesso</label><select id="uf_papel">${PAPEIS.map(p=>`<option ${p===u.papel?'selected':''}>${p}</option>`).join('')}</select></div></div>
      <div class="field"><label>Senha ${id?'(deixe em branco para manter a atual)':''}</label><input id="uf_senha" type="password" placeholder="${id?'••••••••':'defina uma senha'}"></div>
      <div class="section-title">Recuperação de senha ${isSelf?'':'(opcional)'}</div>
      <div class="muted mb" style="font-size:12px">Define a pergunta que permite ${isSelf?'você mesmo':'esse usuário'} redefinir a senha sozinho pelo link "Esqueci minha senha", sem depender do administrador.</div>
      <div class="field"><label>Pergunta de segurança</label><input id="uf_pergunta" value="${esc(u.perguntaSeg||'')}" placeholder="Ex.: Nome do seu primeiro animal de estimação?"></div>
      <div class="field"><label>Resposta</label><input id="uf_resposta" value="${esc(u.respostaSeg||'')}" placeholder="Resposta (não é case-sensitive)"></div>
      <div class="muted" style="font-size:12px">O perfil <b>Administrador</b> é o único que pode cadastrar novos usuários e gerenciar esta página.</div>
    </div>
    <div class="drawer-foot"><button class="btn btn-primary" onclick="saveUser('${id||''}')">${icon('check')} Salvar</button></div>`);
}
function saveUser(id){
  const g=x=>document.getElementById(x).value.trim();
  const nome=g('uf_nome'), usuario=g('uf_usuario'), senha=g('uf_senha'), papel=document.getElementById('uf_papel').value;
  const perguntaSeg=g('uf_pergunta'), respostaSeg=g('uf_resposta');
  if(!nome||!usuario){ toast('Informe nome e usuário.'); return; }
  if(!id && !senha){ toast('Defina uma senha para o novo usuário.'); return; }
  const dup = DB.users.find(x=>x.usuario.toLowerCase()===usuario.toLowerCase() && x.id!==id);
  if(dup){ toast('Já existe um usuário com esse login.'); return; }
  if(id){
    const u=DB.users.find(x=>x.id===id);
    Object.assign(u,{nome,usuario,papel,perguntaSeg,respostaSeg}); if(senha) u.senha=senha;
    if(SESSION && SESSION.id===id) SESSION=u;
  } else {
    DB.users.push({id:uid(),nome,usuario,senha,papel,perguntaSeg,respostaSeg});
  }
  save(); closeDrawer(); render(); toast('Usuário salvo.');
}
function askDelUser(id){
  if(id===SESSION.id){ toast('Você não pode excluir o próprio usuário logado.'); return; }
  const admins=DB.users.filter(x=>x.papel==='Administrador');
  const u=DB.users.find(x=>x.id===id); if(!u)return;
  if(u.papel==='Administrador' && admins.length<=1){ toast('É preciso manter ao menos um administrador.'); return; }
  const qtd=DB.budgets.filter(b=>b.criadoPor&&b.criadoPor.id===id).length;
  confirmDel(`Excluir o usuário <b>${esc(u.nome)}</b>?${qtd?` A assinatura permanece nos ${qtd} orçamento(s) já criados por ele.`:''}`, ()=>{
    DB.users=DB.users.filter(x=>x.id!==id); save(); closeDrawer(); render(); toast('Usuário excluído.');
  });
}

/* ================== BOOT (detecta servidor; senão, modo local) ================== */
async function initApp(){
  REMOTE=false;
  if(typeof fetch!=='undefined'){
    try{
      const ctl=(typeof AbortController!=='undefined')?new AbortController():null;
      const t=ctl?setTimeout(()=>ctl.abort(),3500):null;
      const r=await fetch('/api/health', ctl?{signal:ctl.signal}:{});
      if(t) clearTimeout(t);
      if(r.ok){ const j=await r.json(); REMOTE=!!(j&&j.ok&&j.db); }
    }catch(e){ REMOTE=false; }
  }
  if(REMOTE){
    SESSION=null;
    try{ TOKEN=localStorage.getItem('gomesbuffet_token')||null; }catch(e){ TOKEN=null; }
    if(TOKEN){
      try{ const r=await api('/api/state'); if(r.state) adoptRemoteState(r.state, r.updated_at); }
      catch(e){ TOKEN=null; try{ localStorage.removeItem('gomesbuffet_token'); }catch(_){} }
    }
  }
  render();
}
initApp();
</script>
</body>
</html>
