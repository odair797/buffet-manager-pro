<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gomes Buffet · Manager Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Marcellus&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN SYSTEM — cores da logo Gomes Buffet ============ */
:root{
  --primary:#1B4332; --primary-2:#2D6A4F; --primary-3:#40916C;
  --gold:#C9A227; --gold-2:#E3C565; --gold-soft:rgba(201,162,39,.14);
  --bg:#F5F3EC; --surface:#FFFFFF; --surface-2:#FBFAF6;
  --text:#1C2B24; --muted:#6B7A72; --border:#E5E1D4;
  --success:#2D6A4F; --danger:#C0392B; --warn:#B7791F; --info:#2C5F8A;
  --shadow:0 1px 3px rgba(20,40,30,.08),0 8px 24px rgba(20,40,30,.06);
  --radius:14px;
  --sidebar-bg:linear-gradient(180deg,#14352A 0%,#0F2A20 100%);
}
html.dark{
  --bg:#0D1712; --surface:#152119; --surface-2:#1A2820;
  --text:#E8EDE9; --muted:#93A69B; --border:#25382E;
  --primary:#3E8E68; --primary-2:#52B788; --primary-3:#74C69D;
  --gold-soft:rgba(201,162,39,.18);
  --shadow:0 1px 3px rgba(0,0,0,.35),0 8px 24px rgba(0,0,0,.25);
  --sidebar-bg:linear-gradient(180deg,#0F221A 0%,#0A1912 100%);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;transition:background .3s,color .3s}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13.5px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 12px;outline:none;transition:border .15s,box-shadow .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary-2);box-shadow:0 0 0 3px rgba(45,106,79,.15)}
label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}

/* ============ LAYOUT ============ */
.app{display:flex;min-height:100vh}
.sidebar{width:236px;background:var(--sidebar-bg);color:#DCE7E0;position:fixed;inset:0 auto 0 0;display:flex;flex-direction:column;z-index:40;transition:transform .25s}
.main{flex:1;margin-left:236px;display:flex;flex-direction:column;min-height:100vh}
.brand{display:flex;align-items:center;justify-content:center;padding:22px 14px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand-logo{width:112px;height:112px;flex-shrink:0}
.brand-name{font-family:'Marcellus',serif;font-size:19px;letter-spacing:2.5px;color:#fff;line-height:1}
.brand-sub{font-size:9px;letter-spacing:3.5px;color:var(--gold-2);font-weight:600;margin-top:3px}
.login-logo{width:150px;height:150px;margin:0 auto}
.nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-section{font-size:10px;letter-spacing:1.5px;color:rgba(220,231,224,.45);font-weight:700;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9.5px 12px;border-radius:10px;color:rgba(220,231,224,.82);font-weight:500;font-size:13.5px;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(201,162,39,.16);color:var(--gold-2)}
.nav-item.active svg{stroke:var(--gold-2)}
.nav-item svg{width:17px;height:17px;stroke:currentColor;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--gold);color:#14352A;font-size:10.5px;font-weight:800;border-radius:20px;padding:1.5px 7px}
.sidebar-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(220,231,224,.5)}

.topbar{height:62px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 24px;position:sticky;top:0;z-index:30}
.topbar h1{font-size:17px;font-weight:700}
.topbar .crumb{color:var(--muted);font-size:12.5px}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
.icon-btn:hover{border-color:var(--primary-2);color:var(--primary-2)}
.icon-btn svg{width:17px;height:17px;stroke:currentColor}
.dot{position:absolute;top:7px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--danger)}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:2px solid var(--gold)}
.content{padding:24px;flex:1;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ============ COMPONENTES ============ */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;font-weight:600;font-size:13.5px;padding:9px 16px;border:1px solid transparent;transition:all .15s}
.btn svg{width:15px;height:15px;stroke:currentColor}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(27,67,50,.3)}
.btn-gold{background:var(--gold);color:#14352A}
.btn-gold:hover{background:var(--gold-2);transform:translateY(-1px)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--primary-2);color:var(--primary-2)}
.btn-danger{background:transparent;border-color:var(--border);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:20px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.card-head h3{font-size:14.5px;font-weight:700}
.grid{display:grid;gap:16px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.g4,.g3,.g2{grid-template-columns:1fr}.sidebar{transform:translateX(-100%)}.main{margin-left:0}}
.kpi{padding:18px;position:relative;overflow:hidden}
.kpi .k-label{font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:7px}
.kpi .k-label svg{width:15px;height:15px;stroke:var(--primary-3)}
.kpi .k-value{font-size:24px;font-weight:800;margin-top:8px;letter-spacing:-.5px}
.kpi .k-sub{font-size:11.5px;color:var(--muted);margin-top:4px}
.kpi .k-trend{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px}
.trend-up{background:rgba(45,106,79,.12);color:var(--success)}
.trend-down{background:rgba(192,57,43,.1);color:var(--danger)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--gold));opacity:0;transition:opacity .2s}
.kpi:hover::after{opacity:1}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px}
.b-green{background:rgba(45,106,79,.13);color:var(--success)}
.b-gold{background:var(--gold-soft);color:var(--warn)}
.b-red{background:rgba(192,57,43,.11);color:var(--danger)}
.b-blue{background:rgba(44,95,138,.12);color:var(--info)}
.b-gray{background:rgba(107,122,114,.13);color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle}
tbody tr{transition:background .12s;cursor:pointer}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}
.right{text-align:right}
.money{font-variant-numeric:tabular-nums;font-weight:600}

/* drawer / modal */
.overlay{position:fixed;inset:0;background:rgba(10,20,15,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(2px)}
.overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:94vw;background:var(--surface);z-index:60;transform:translateX(105%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(0,0,0,.18)}
.drawer.open{transform:none}
.drawer-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.drawer-head h3{font-size:16px;font-weight:700}
.drawer-body{flex:1;overflow-y:auto;padding:22px}
.drawer-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.close-x{width:32px;height:32px;border-radius:9px;border:1px solid var(--border);background:none;color:var(--muted);font-size:16px}
.close-x:hover{color:var(--danger);border-color:var(--danger)}
.field{margin-bottom:14px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--primary);color:#fff;padding:12px 22px;border-radius:12px;font-weight:600;font-size:13.5px;z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 10px 30px rgba(0,0,0,.25);display:flex;gap:9px;align-items:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast svg{width:16px;height:16px;stroke:var(--gold-2)}
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .e-ico{font-size:34px;margin-bottom:10px}
.tabs{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:4px;width:fit-content}
.tab{border:none;background:none;padding:7px 15px;border-radius:8px;font-weight:600;font-size:13px;color:var(--muted);transition:all .15s}
.tab.active{background:var(--surface);color:var(--primary);box-shadow:var(--shadow)}
html.dark .tab.active{color:var(--primary-3)}
.searchbox{position:relative;width:260px}
.searchbox input{padding-left:34px}
.searchbox svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--muted)}
.progressbar{height:7px;border-radius:7px;background:var(--border);overflow:hidden}
.progressbar>div{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--primary-2),var(--gold));transition:width .5s}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12.5px;font-weight:600;background:var(--surface);transition:all .15s;cursor:pointer}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.avatar-sm{width:30px;height:30px;border-radius:50%;background:var(--primary-2);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}

/* calendário */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--border);border-top:1px solid var(--border)}
.cal-dow{padding:9px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface-2)}
.cal-cell{min-height:96px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:7px;position:relative;transition:background .12s;cursor:pointer}
.cal-cell:hover{background:var(--surface-2)}
.cal-cell.other{opacity:.38}
.cal-num{font-size:12px;font-weight:600;color:var(--muted)}
.cal-cell.today .cal-num{background:var(--gold);color:#14352A;width:23px;height:23px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800}
.cal-ev{margin-top:4px;font-size:11px;font-weight:600;padding:3px 7px;border-radius:6px;background:var(--primary);color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-ev.gold{background:var(--gold);color:#14352A}
.cal-ev.gray{background:var(--muted)}

/* barra de gráfico */
.chart{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:10px}
.chart .bar-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.chart .bar{width:100%;max-width:38px;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,var(--primary-2),var(--primary));position:relative;transition:all .3s;min-height:4px}
.chart .bar.gold{background:linear-gradient(180deg,var(--gold-2),var(--gold))}
.chart .bar:hover{filter:brightness(1.15)}
.chart .bar-lbl{font-size:10.5px;color:var(--muted);font-weight:600}
.chart .bar-val{font-size:10px;font-weight:700;color:var(--muted)}
.legend{display:flex;gap:16px;font-size:12px;color:var(--muted);align-items:center}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:6px}

/* wizard orçamento */
.steps{display:flex;gap:0;margin-bottom:22px}
.step{flex:1;text-align:center;position:relative;padding-top:26px;font-size:12px;font-weight:600;color:var(--muted)}
.step::before{content:attr(data-n);position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:26px;border-radius:50%;background:var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;z-index:2}
.step::after{content:'';position:absolute;top:12px;left:-50%;width:100%;height:2px;background:var(--border);z-index:1}
.step:first-child::after{display:none}
.step.done::before,.step.act::before{background:var(--primary);color:#fff}
.step.act{color:var(--primary)}
.step.done::after,.step.act::after{background:var(--primary)}
.step.act::before{box-shadow:0 0 0 4px rgba(45,106,79,.2)}
.sumrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--border);font-size:13.5px}
.sumrow:last-child{border:none}
.sumrow b{font-variant-numeric:tabular-nums}
.total-box{background:linear-gradient(135deg,var(--primary),#153726);color:#fff;border-radius:14px;padding:20px;margin-top:14px}
html.dark .total-box{background:linear-gradient(135deg,#1B4332,#0F2A20)}
.total-box .tb-l{font-size:12px;opacity:.75;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
.total-box .tb-v{font-size:29px;font-weight:800;color:var(--gold-2);letter-spacing:-.5px}
.qty-input{width:76px !important;text-align:right;padding:5px 8px !important;font-size:13px !important}
.alert-row{display:flex;gap:11px;padding:12px 14px;border-radius:11px;margin-bottom:9px;font-size:13px;align-items:flex-start;border:1px solid var(--border);background:var(--surface-2)}
.alert-row .a-ico{font-size:16px;line-height:1.3}
.checklist-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--border);font-size:13.5px}
.checklist-item input[type=checkbox]{width:17px;height:17px;accent-color:var(--primary-2);cursor:pointer}
.checklist-item.done span{text-decoration:line-through;color:var(--muted)}
.mt{margin-top:16px}.mb{margin-bottom:16px}.flex{display:flex;align-items:center;gap:10px}.spread{display:flex;align-items:center;justify-content:space-between;gap:10px}
.muted{color:var(--muted);font-size:12.5px}
.section-title{font-size:13px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--primary);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
html.dark .section-title{color:var(--primary-3)}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* botão global de cadastro */
.cadastro-wrap{position:relative}
.cadastro-menu{position:absolute;top:46px;right:0;width:250px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:6px;z-index:80;animation:popin .16s ease}
@keyframes popin{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.cadastro-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 11px;border-radius:9px;border:none;background:none;text-align:left;font-size:13.5px;font-weight:600;color:var(--text)}
.cadastro-item:hover{background:var(--surface-2);color:var(--primary)}
html.dark .cadastro-item:hover{color:var(--primary-3)}
.cadastro-item svg{width:16px;height:16px;stroke:var(--gold);flex-shrink:0}
.cadastro-sep{height:1px;background:var(--border);margin:5px 4px}

/* menu do usuário logado */
.user-wrap{position:relative}
.user-menu{position:absolute;top:46px;right:0;width:220px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:6px;z-index:80;animation:popin .16s ease}
.user-menu-head{padding:10px 11px 8px;border-bottom:1px solid var(--border);margin-bottom:6px}
.user-menu-head b{font-size:13.5px}
.user-menu-head div{font-size:11.5px;color:var(--muted)}

/* tela de login */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 20%,#1E4A38,#0C1F18 70%);padding:20px}
.login-card{width:380px;max-width:100%;background:var(--surface);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);padding:34px 30px 28px;text-align:center}
.login-title{font-family:'Marcellus',serif;font-size:19px;margin:14px 0 2px;color:var(--text)}
.login-sub{font-size:12.5px;color:var(--muted);margin-bottom:22px}
.login-field{text-align:left;margin-bottom:14px}
.login-err{background:rgba(192,57,43,.1);color:var(--danger);font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:9px;margin-bottom:14px;text-align:left}
.login-hint{margin-top:18px;font-size:11.5px;color:var(--muted);line-height:1.5}
.link-btn{background:none;border:none;color:var(--primary-2);font-weight:600;font-size:12.5px;cursor:pointer;padding:0}
.link-btn:hover{text-decoration:underline}
.login-ok{background:rgba(45,106,79,.12);color:var(--success);font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:9px;margin-bottom:14px;text-align:left}

/* assinatura no orçamento */
.signature-box{margin-top:18px;padding-top:14px;border-top:1px dashed var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.signature-name{font-family:'Dancing Script',cursive;font-size:26px;color:var(--primary);line-height:1}
html.dark .signature-name{color:var(--primary-3)}
.signature-meta{font-size:11px;color:var(--muted);text-align:right;line-height:1.5}

/* checklist editável */
.checklist-item{position:relative;padding-right:26px}
.checklist-del{position:absolute;right:0;top:50%;transform:translateY(-50%);width:20px;height:20px;border:none;background:none;color:var(--muted);border-radius:6px;display:flex;align-items:center;justify-content:center}
.checklist-del:hover{color:var(--danger);background:rgba(192,57,43,.1)}
.checklist-del svg{width:14px;height:14px}
.checklist-add{display:flex;gap:8px;margin-top:10px}

/* pré-visualizador de PDF */
.pv-wrap{position:fixed;inset:0;background:rgba(8,16,12,.72);z-index:95;display:none;flex-direction:column;padding:18px;backdrop-filter:blur(3px)}
.pv-wrap.open{display:flex;animation:fadein .2s ease}
.pv-bar{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-radius:14px 14px 0 0;padding:10px 18px;gap:12px}
.pv-bar b{font-size:14px}
.pv-frame{flex:1;background:#4A5450;border-radius:0 0 14px 14px;overflow:auto;display:flex;justify-content:center;padding:18px}
#pvIframe{width:820px;max-width:100%;height:100%;border:none;background:#fff;border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>
<div class="toast" id="toast"></div>
<div class="pv-wrap" id="pvWrap">
  <div class="pv-bar">
    <b id="pvTitle">Pré-visualização</b>

var REMOTE=false, TOKEN=null, lastSync=null, saveTimer=null;
function save(){
  try{ localStorage.setItem('gomesbuffet_db', JSON.stringify(DB)); }catch(e){}
  if(REMOTE && TOKEN){ clearTimeout(saveTimer); saveTimer=setTimeout(pushState, 700); }
}
async function api(path, opts){
  opts=opts||{};
  const headers={'Content-Type':'application/json'};
  if(TOKEN) headers['Authorization']='Bearer '+TOKEN;
  const r=await fetch(path, Object.assign({}, opts, {headers}));
  let j=null; try{ j=await r.json(); }catch(e){}
  if(!r.ok) throw new Error((j&&j.error)||('Erro de conexão ('+r.status+')'));
  return j;
}
function tokenUid(){
  try{ const b=TOKEN.split('.')[0].replace(/-/g,'+').replace(/_/g,'/'); return JSON.parse(atob(b)).uid; }catch(e){ return null; }
}
function adoptRemoteState(state, updatedAt, uid){
  if(state && state.fresh){
    const seeded=JSON.parse(JSON.stringify(SEED));
    seeded.users=state.users; seeded.budgets=[]; seeded.events=[]; seeded.finance=[];
    DB=seeded; migrateDB();
    if(REMOTE && TOKEN) pushState();
  } else if(state){ DB=state; migrateDB(); }
  lastSync=updatedAt||null;
  const id=uid||tokenUid();
  SESSION=DB.users.find(u=>u.id===id)||null;
  try{ localStorage.setItem('gomesbuffet_db', JSON.stringify(DB)); }catch(e){}
}
async function pushState(){
  try{ const r=await api('/api/state',{method:'PUT', body:JSON.stringify({data:DB})}); lastSync=r.updated_at; }
  catch(e){ toast('⚠ Falha ao salvar no servidor: '+e.message); }
}
async function pullState(){
  if(!REMOTE||!TOKEN||W) return;
  try{
    const r=await api('/api/state');
    if(r.updated_at && r.updated_at!==lastSync && r.state){
      const uid=SESSION&&SESSION.id;
      DB=r.state; migrateDB(); lastSync=r.updated_at;
      SESSION=DB.users.find(u=>u.id===uid)||null;
      if(!SESSION){ logout(); toast('Seu usuário foi alterado ou removido. Entre novamente.'); return; }
      render();
    }
  }catch(e){}
}
setInterval(pullState, 45000);
if(typeof window!=='undefined') window.addEventListener('focus', ()=>pullState());

/* ================== CÁLCULO DO ORÇAMENTO (motor central) ================== */
function calcBudget(b){
  const menu = DB.menus.find(m=>m.id===b.menuId);
  const linhas = (b.itens && b.itens.length? b.itens : (menu?menu.itens.map(i=>({ing:i})):[])).map(l=>{
    const ing = DB.ingredients.find(i=>i.id===l.ing); if(!ing) return null;
    const qtd = l.qtd!=null ? l.qtd : +(ing.pp*b.pessoas).toFixed(2);
    const preco = l.preco!=null ? l.preco : ing.pMed;
    return {ing:ing.id, nome:ing.nome, un:ing.un, cat:ing.cat, qtd, preco, pMin:ing.pMin, pMax:ing.pMax, total:+(qtd*preco).toFixed(2)};
  }).filter(Boolean);
  const custoIngredientes = linhas.reduce((s,l)=>s+l.total,0);
  const custoEquipe = (b.equipe||[]).reduce((s,id)=>{const t=DB.team.find(x=>x.id===id);return s+(t?t.diaria:0)},0);
  const custoAluguel = (b.alugueis||[]).reduce((s,a)=>{const r=DB.rentals.find(x=>x.id===a.id);return s+(r?r.ultimo*a.qtd:0)},0);
  const custoTotal = custoIngredientes+custoEquipe+custoAluguel+(b.outros||0);
  const preco = b.precoManual!=null ? b.precoManual : +(custoTotal/(1-(b.margem||30)/100)).toFixed(2);
  const lucro = preco-custoTotal;
  const margemReal = preco>0 ? lucro/preco*100 : 0;
  return {linhas,custoIngredientes,custoEquipe,custoAluguel,custoTotal,preco,lucro,margemReal,porPessoa:b.pessoas?preco/b.pessoas:0};
}
function makeBudget(o){
  const b = Object.assign({id:uid(), status:'rascunho', criado:todayISO(), itens:[], outros:0, precoManual:null}, o);
  if(!b.itens.length){ const menu=DB.menus.find(m=>m.id===b.menuId); if(menu) b.itens=menu.itens.map(i=>({ing:i})); }
  return b;
}

/* ================== APROVAÇÃO → gera evento, financeiro, reservas ================== */
function approveEffects(b, silent){
  const c = calcBudget(b);
  const cli = DB.clients.find(x=>x.id===b.clienteId);
  const ev = {
    id:uid(), budgetId:b.id, clienteId:b.clienteId, titulo:`${b.tipo} — ${cli?cli.nome:'Cliente'}`,
    data:b.data, hora:b.hora, local:b.local, pessoas:b.pessoas, equipe:[...(b.equipe||[])],
    alugueis:JSON.parse(JSON.stringify(b.alugueis||[])), status:'confirmado', obs:b.obs||'',
    checklist:[
      {t:'Confirmar equipe escalada', ok:false},
      {t:'Comprar ingredientes', ok:false},
      {t:'Reservar equipamentos de aluguel', ok:false},
      {t:'Confirmar endereço e horário com cliente', ok:false},
      {t:'Separar utensílios e descartáveis', ok:false},
      {t:'Receber pagamento final', ok:false},
    ],
  };
  DB.events.push(ev);
  const sinal = +(c.preco*DB.cfg.sinalPct/100).toFixed(2);
  DB.finance.push(
    {id:uid(), budgetId:b.id, tipo:'receita', desc:`Sinal ${DB.cfg.sinalPct}% — ${ev.titulo}`, valor:sinal, venc:b.criado, status:'recebido', recebidoEm:b.criado, cat:'Eventos'},
    {id:uid(), budgetId:b.id, tipo:'receita', desc:`Saldo final — ${ev.titulo}`, valor:+(c.preco-sinal).toFixed(2), venc:b.data, status:'pendente', cat:'Eventos'},
    {id:uid(), budgetId:b.id, tipo:'despesa', desc:`Custo previsto — ${ev.titulo}`, valor:+c.custoTotal.toFixed(2), venc:b.data, status:'previsto', cat:'Custos de evento'},
  );
  if(!silent){ save(); toast('Orçamento aprovado! Evento, agenda e financeiro criados automaticamente.'); }
  return ev;
}

      ${recoverErr?`<div class="login-err">${esc(recoverErr)}</div>`:''}
      <div class="login-field"><label>Nova senha</label><input id="rc_pass1" type="password" placeholder="mínimo 4 caracteres"></div>
      <div class="login-field"><label>Confirmar nova senha</label><input id="rc_pass2" type="password" placeholder="repita a senha" onkeydown="if(event.key==='Enter')recoverSetPassword()"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="recoverSetPassword()">${icon('check')} Salvar nova senha</button>`;
  }
  document.getElementById('app').innerHTML = `
  <div class="login-screen">
    <div class="login-card">
      <div class="brand-logo" style="width:96px;height:96px;margin:0 auto">${LOGO_SVG}</div>
      <div class="login-title">Redefinir senha</div>
      ${body}
      <div class="login-hint"><button class="link-btn" onclick="closeRecover()">${icon('left','width:12px;height:12px;display:inline;vertical-align:-1px')} Voltar ao login</button></div>
    </div>
  </div>`;
  const first=document.querySelector('.login-card input'); if(first) first.focus();
}
function recoverFindUser(){
  const usuario=document.getElementById('rc_user').value.trim();
  const u=DB.users.find(x=>x.usuario.toLowerCase()===usuario.toLowerCase());
  if(!u){ recoverErr='Usuário não encontrado.'; render(); return; }
  if(!u.perguntaSeg || !u.respostaSeg){ recoverErr='Este usuário não tem pergunta de segurança cadastrada. Peça para o administrador redefinir sua senha em Usuários.'; render(); return; }
  recoverUserId=u.id; recoverErr=''; recoverStage=2; render();
}
function recoverCheckAnswer(){
  const u=DB.users.find(x=>x.id===recoverUserId);
  const resp=document.getElementById('rc_resp').value.trim().toLowerCase();
  if(resp!==u.respostaSeg.trim().toLowerCase()){ recoverErr='Resposta incorreta.'; render(); return; }
  recoverErr=''; recoverStage=3; render();
}
function recoverSetPassword(){
  const p1=document.getElementById('rc_pass1').value, p2=document.getElementById('rc_pass2').value;
  if(p1.length<4){ recoverErr='A senha deve ter ao menos 4 caracteres.'; render(); return; }
  if(p1!==p2){ recoverErr='As senhas não coincidem.'; render(); return; }
  const u=DB.users.find(x=>x.id===recoverUserId);
  u.senha=p1; save();
  recoverOpen=false; recoverStage=1; recoverUserId=null; recoverErr='';
  loginOk='Senha redefinida com sucesso! Faça login com a nova senha.';
  render();
}
function toggleTheme(){
  document.documentElement.classList.toggle('dark');
  try{ localStorage.setItem('gomesbuffet_theme', document.documentElement.classList.contains('dark')?'dark':'light'); }catch(e){}
  render();
}
try{ if(localStorage.getItem('gomesbuffet_theme')==='dark') document.documentElement.classList.add('dark'); }catch(e){}

/* drawer + toast */
function openDrawer(html){ document.getElementById('drawer').innerHTML=html; document.getElementById('drawer').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeDrawer(){ document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.innerHTML=icon('check')+esc(msg); t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),3400); }

/* pré-visualizador de documentos (proposta/contrato) */
function openPreview(html, titulo){
  document.getElementById('pvTitle').textContent=titulo||'Pré-visualização';
  document.getElementById('pvIframe').setAttribute('srcdoc', html);
  document.getElementById('pvWrap').classList.add('open');
}
function closePreview(){ document.getElementById('pvWrap').classList.remove('open'); }
function pvPrint(){
  const fr=document.getElementById('pvIframe');
  try{ fr.contentWindow.focus(); fr.contentWindow.print(); }
  catch(e){ toast('Não foi possível abrir a impressão. Tente pelo navegador (Ctrl+P).'); }
}

<script>
/* ================== MÓDULO ORÇAMENTOS (principal) ================== */
let W = null; // estado do wizard
const STATUS_B = {rascunho:['b-gray','Rascunho'], pendente:['b-gold','Aguardando cliente'], aprovado:['b-green','Aprovado'], recusado:['b-red','Recusado']};

PAGES.orcamentos = () => {
  if(W) return wizardView();
  const rows = [...DB.budgets].sort((a,b)=>b.criado.localeCompare(a.criado)).map(b=>{
    const c = calcBudget(b), cli = DB.clients.find(x=>x.id===b.clienteId);

    return `<tr onclick="openBudget('${b.id}')">

      <td>${fmtD(b.data)} · ${b.hora}</td>
      <td class="right">${b.pessoas}</td>
      <td class="right money">${fmt(c.preco)}</td>
      <td class="right"><span class="badge ${c.margemReal>=30?'b-green':c.margemReal>=15?'b-gold':'b-red'}">${fmtN(c.margemReal,0)}%</span></td>
      <td><span class="badge ${st[0]}">${st[1]}</span></td>
      <td class="muted" style="font-size:12.5px">${b.criadoPor?esc(b.criadoPor.nome):'—'}</td>
    </tr>`;
  }).join('');
  return `
  <div class="spread mb">
    <div class="muted">Crie orçamentos com estimativa automática de ingredientes, custos e margem. Ao aprovar, o sistema gera evento, agenda e financeiro.</div>
    <button class="btn btn-primary" onclick="startWizard()">${icon('plus')} Novo orçamento</button>
  </div>
  <div class="card">${DB.budgets.length?`<table><thead><tr><th>Cliente / Evento</th><th>Data</th><th class="right">Convidados</th><th class="right">Valor</th><th class="right">Margem</th><th>Status</th><th>Responsável</th></tr></thead><tbody>${rows}</tbody></table>`
    :`<div class="empty"><div class="e-ico">📋</div>Nenhum orçamento ainda.<br><br><button class="btn btn-primary" onclick="startWizard()">${icon('plus')} Criar o primeiro</button></div>`}</div>`;
};

function startWizard(b){
  W = b ? {step:1, b:JSON.parse(JSON.stringify(b)), edit:true}
        : {step:1, b:makeBudget({clienteId:DB.clients[0].id, tipo:'Aniversário', pessoas:50, local:'', data:todayISO(), hora:'12:00', menuId:'churrasco', contratoId:DB.contratos[0]?DB.contratos[0].id:'', pagamento:'50% sinal + 50% no evento', validade:'', obs:'', equipe:[], alugueis:[], margem:DB.cfg.margemPadrao})};
  render();
}
function wStep(n){
  if(n>=2) syncStep1();
  if(W.step===1 && n>1){
    if(!W.b.local){ toast('Informe o local do evento.'); return; }
  }
  W.step=n; render();
  window.scrollTo({top:0,behavior:'smooth'});
}
function syncStep1(){
  const g=id=>document.getElementById(id);
  if(!g('w_cli')) return;
  const b=W.b, oldMenu=b.menuId, oldP=b.pessoas;
  b.clienteId=g('w_cli').value; b.tipo=g('w_tipo').value; b.pessoas=+g('w_pess').value||1;
  b.data=g('w_data').value||todayISO(); b.hora=g('w_hora').value||'12:00'; b.local=g('w_local').value.trim();
  b.menuId=g('w_menu').value; b.contratoId=g('w_contrato')?g('w_contrato').value:b.contratoId; b.pagamento=g('w_pag').value; b.validade=g('w_val').value; b.obs=g('w_obs').value;
  if(b.menuId!==oldMenu){ const m=DB.menus.find(x=>x.id===b.menuId); b.itens=m?m.itens.map(i=>({ing:i})):[]; }
  else if(b.pessoas!==oldP){ b.itens=b.itens.map(l=>({ing:l.ing, preco:l.preco})); } // recalcula qtds
}
function cancelWizard(){ W=null; render(); }

function wizardView(){
  const b=W.b, c=calcBudget(b);
  const steps=['Dados do evento','Estimativa inteligente','Equipe & Aluguéis','Resumo & Preço'];
  let body='';
  if(W.step===1){
    body=`<div class="card card-pad">
      <div class="frow">
        <div class="field"><label>Cliente</label><select id="w_cli">${DB.clients.map(x=>`<option value="${x.id}" ${x.id===b.clienteId?'selected':''}>${esc(x.nome)}</option>`).join('')}</select></div>
        <div class="field"><label>Tipo de evento</label><input id="w_tipo" value="${esc(b.tipo)}" list="tipos"><datalist id="tipos"><option>Aniversário</option><option>Casamento</option><option>Confraternização empresa</option><option>Formatura</option><option>Batizado</option><option>Quermesse</option></datalist></div>
      </div>
      <div class="frow3">
        <div class="field"><label>Convidados</label><input id="w_pess" type="number" min="1" value="${b.pessoas}"></div>
        <div class="field"><label>Data</label><input id="w_data" type="date" value="${b.data}"></div>
        <div class="field"><label>Horário</label><input id="w_hora" type="time" value="${b.hora}"></div>
      </div>
      <div class="field"><label>Local do evento</label><input id="w_local" value="${esc(b.local)}" placeholder="Endereço completo"></div>
      <div class="frow3">
        <div class="field"><label>Cardápio vinculado</label><select id="w_menu">${DB.menus.map(m=>`<option value="${m.id}" ${m.id===b.menuId?'selected':''}>${esc(m.nome)}</option>`).join('')}</select></div>
        <div class="field"><label>Contrato vinculado</label><select id="w_contrato"><option value="">— Sem contrato —</option>${DB.contratos.map(ct=>`<option value="${ct.id}" ${ct.id===b.contratoId?'selected':''}>${esc(ct.titulo)}</option>`).join('')}</select></div>
        <div class="field"><label>Forma de pagamento</label><input id="w_pag" value="${esc(b.pagamento)}"></div>
      </div>
      <div class="frow">
        <div class="field"><label>Validade da proposta</label><input id="w_val" type="date" value="${b.validade||''}"></div>
        <div></div>
      </div>
      <div class="field"><label>Observações</label><textarea id="w_obs" rows="2">${esc(b.obs||'')}</textarea></div>
    </div>`;
  }
  if(W.step===2){
    const cats=[...new Set(c.linhas.map(l=>l.cat))];
    body=`<div class="card">
      <div class="card-head"><h3>${icon('spark','width:16px;height:16px;stroke:var(--gold)')} Estimativa para ${b.pessoas} convidados — ${esc(DB.menus.find(m=>m.id===b.menuId)?.nome||'')}</h3>
      <span class="muted">Quantidades e preços editáveis · preços médios do histórico local</span></div>
      <table><thead><tr><th>Ingrediente</th><th class="right">Qtd</th><th>Un</th><th class="right">Preço un.</th><th class="right muted">mín / máx</th><th class="right">Total</th></tr></thead><tbody>
      ${cats.map(cat=>`<tr style="cursor:default;background:var(--surface-2)"><td colspan="6" style="font-weight:800;font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--primary);padding:8px 14px">${cat}</td></tr>`+
        c.linhas.filter(l=>l.cat===cat).map(l=>`<tr style="cursor:default">
          <td>${esc(l.nome)}</td>
          <td class="right"><input class="qty-input" type="number" step="0.1" min="0" value="${l.qtd}" onchange="wSetLine('${l.ing}','qtd',this.value)"></td>
          <td class="muted">${l.un}</td>
          <td class="right"><input class="qty-input" type="number" step="0.1" min="0" value="${l.preco}" onchange="wSetLine('${l.ing}','preco',this.value)"></td>
          <td class="right muted" style="font-size:11.5px">${fmt(l.pMin)} / ${fmt(l.pMax)}</td>
          <td class="right money">${fmt(l.total)}</td>
        </tr>`).join('')).join('')}
      </tbody></table>
      <div class="spread" style="padding:14px 20px;border-top:1px solid var(--border)">
        <span class="muted">Base configurável em <b>Estimativas & Preços</b>. Consulta automática na internet: arquitetura preparada (usa histórico local).</span>
        <b style="font-size:16px">Ingredientes: <span style="color:var(--primary)">${fmt(c.custoIngredientes)}</span></b>
      </div></div>`;
  }
  if(W.step===3){
    body=`<div class="grid g2">
      <div class="card card-pad">
        <div class="section-title" style="margin-top:0">Equipe do evento</div>
        ${DB.team.map(t=>{const on=(b.equipe||[]).includes(t.id);return `<div class="spread" style="padding:8px 0;border-bottom:1px dashed var(--border)">
          <div class="flex"><span class="avatar-sm">${initials(t.nome)}</span><div><b>${esc(t.nome)}</b><div class="muted">${esc(t.funcao)} · ${esc(t.disp)}</div></div></div>
          <div class="flex"><span class="money muted">${fmt(t.diaria)}</span><button class="chip ${on?'on':''}" onclick="wToggleTeam('${t.id}')">${on?'✓ Escalado':'Escalar'}</button></div>
        </div>`}).join('')}
        <div class="spread mt"><b>Custo mão de obra</b><b class="money" style="color:var(--primary)">${fmt(c.custoEquipe)}</b></div>
      </div>
      <div class="card card-pad">
        <div class="section-title" style="margin-top:0">Equipamentos de aluguel</div>
        ${DB.rentals.map(r=>{const a=(b.alugueis||[]).find(x=>x.id===r.id);return `<div class="spread" style="padding:8px 0;border-bottom:1px dashed var(--border)">
          <div><b>${esc(r.item)}</b><div class="muted">último valor: ${fmt(r.ultimo)}/${r.un}</div></div>
          <div class="flex"><input class="qty-input" type="number" min="0" value="${a?a.qtd:0}" onchange="wSetRental('${r.id}',this.value)"><span class="muted">${r.un}</span></div>
        </div>`}).join('')}
        <div class="spread mt"><b>Custo aluguéis</b><b class="money" style="color:var(--primary)">${fmt(c.custoAluguel)}</b></div>
        <div class="field mt"><label>Outros custos (R$)</label><input type="number" min="0" step="10" value="${b.outros||0}" onchange="W.b.outros=+this.value||0;render()"></div>
      </div>
    </div>`;
  }
  if(W.step===4){

      <div class="card card-pad">
        <div class="section-title" style="margin-top:0">Resumo da proposta</div>
        <div class="sumrow"><span>Cliente</span><b>${esc(cli?cli.nome:'—')}</b></div>
        <div class="sumrow"><span>Evento</span><b>${esc(b.tipo)} · ${b.pessoas} convidados</b></div>

        <div class="card card-pad">
          <div class="section-title" style="margin-top:0">${icon('spark','width:15px;height:15px;stroke:var(--gold)')} Precificação inteligente</div>

            <input type="range" min="5" max="70" value="${b.margem}" style="accent-color:var(--gold);padding:0;border:none"
              oninput="document.getElementById('mLbl').textContent=this.value+'%'" onchange="W.b.margem=+this.value;W.b.precoManual=null;render()">

          <div class="field"><label>Ou preço manual (R$)</label><input type="number" min="0" step="50" value="${b.precoManual??''}" placeholder="Deixe vazio p/ usar o sugerido" onchange="W.b.precoManual=this.value===''?null:+this.value;render()"></div>
          <div class="total-box">
            <div class="spread"><div><div class="tb-l">Valor da proposta</div><div class="tb-v">${fmt(c.preco)}</div></div>
            <div style="text-align:right"><div class="tb-l">Por pessoa</div><div style="font-size:17px;font-weight:700">${fmt(c.porPessoa)}</div></div></div>
            <div class="spread mt" style="font-size:13px">
              <span>Lucro estimado: <b style="color:${c.lucro>=0?'var(--gold-2)':'#ff9b8a'}">${fmt(c.lucro)}</b></span>
              <span>Margem real: <b>${fmtN(c.margemReal,1)}%</b></span>
            </div>
          </div>
          ${c.margemReal<15?`<div class="alert-row mt" style="border-color:var(--danger)"><span class="a-ico">⚠️</span><span><b>Margem baixa detectada.</b> Abaixo de 15% o risco de prejuízo é alto. Considere ajustar o preço ou reduzir custos.</span></div>`:''}
        </div>
        <div class="card card-pad mt">
          <div class="muted mb">Ao <b>aprovar</b>, o sistema cria automaticamente: evento na agenda, conta a receber (sinal ${DB.cfg.sinalPct}% + saldo), custo previsto, reserva de equipe e equipamentos, e checklist operacional.</div>
          <div class="flex">
            <button class="btn btn-ghost" onclick="saveBudget('pendente')">Salvar e enviar ao cliente</button>

  <div class="steps">${steps.map((s,i)=>`<div class="step ${W.step===i+1?'act':W.step>i+1?'done':''}" data-n="${W.step>i+1?'✓':i+1}">${s}</div>`).join('')}</div>
  ${body}
  <div class="spread mt">
    <button class="btn btn-ghost" ${W.step===1?'style="visibility:hidden"':''} onclick="wStep(${W.step-1})">${icon('left')} Voltar</button>
    ${W.step<4?`<button class="btn btn-primary" onclick="wStep(${W.step+1})">Avançar ${icon('right')}</button>`:''}

}
function wSetLine(ing,campo,val){
  let l=W.b.itens.find(x=>x.ing===ing);
  if(!l){ l={ing}; W.b.itens.push(l); }
  l[campo]=+val||0; render();
}
function wToggleTeam(id){ const e=W.b.equipe||(W.b.equipe=[]); const i=e.indexOf(id); i>=0?e.splice(i,1):e.push(id); render(); }
function wSetRental(id,qtd){ qtd=+qtd||0; const a=W.b.alugueis||(W.b.alugueis=[]); const i=a.findIndex(x=>x.id===id);
  if(qtd<=0){ if(i>=0)a.splice(i,1); } else if(i>=0){ a[i].qtd=qtd; } else a.push({id,qtd}); render(); }
function saveBudget(status){

  if(i>=0) DB.budgets[i]=b; else DB.budgets.push(b);

        <button class="btn btn-gold btn-sm" onclick="printMenu('${b.menuId}')">${icon('print')} Proposta PDF</button>

      <div class="sumrow"><span>Custo total</span><b style="color:var(--danger)">${fmt(c.custoTotal)}</b></div>
      <div class="sumrow"><span>Valor da proposta</span><b>${fmt(c.preco)}</b></div>
      <div class="sumrow"><span>Lucro / margem</span><b style="color:var(--success)">${fmt(c.lucro)} · ${fmtN(c.margemReal,1)}%</b></div>
      <div class="sumrow"><span>Por pessoa</span><b>${fmt(c.porPessoa)}</b></div>
      ${b.obs?`<div class="section-title">Observações</div><div class="muted">${esc(b.obs)}</div>`:''}
      ${b.criadoPor?`<div class="signature-box"><div class="signature-name">${esc(b.criadoPor.nome)}</div><div class="signature-meta">Orçamento elaborado por<br>${fmtD(b.criado)}</div></div>`:''}
    </div>
    <div class="drawer-foot">
      <button class="btn btn-danger btn-sm" onclick="delBudget('${b.id}')">${icon('trash')} Excluir</button>
      ${b.status!=='aprovado'?`<button class="btn btn-ghost btn-sm" onclick="closeDrawer();startWizard(DB.budgets.find(x=>x.id==='${b.id}'))">Editar</button>
      <button class="btn btn-gold btn-sm" onclick="approveBudget('${b.id}')">${icon('check')} Aprovar</button>`:''}
    </div>`);
}
function approveBudget(id){
  const b=DB.budgets.find(x=>x.id===id); if(!b) return;
  b.status='aprovado';
  if(!DB.events.some(e=>e.budgetId===b.id)) approveEffects(b,true);
  save(); closeDrawer(); render();
  toast('Orçamento aprovado! Evento, agenda e financeiro criados automaticamente.');
}
function delBudget(id){
  DB.budgets=DB.budgets.filter(x=>x.id!==id);
  DB.events=DB.events.filter(e=>e.budgetId!==id);
  DB.finance=DB.finance.filter(f=>f.budgetId!==id);
  save(); closeDrawer(); render(); toast('Orçamento excluído (com evento e lançamentos vinculados).');
}
</script>
<script>
/* ================== ALERTAS INTELIGENTES ================== */
function alerts(){
  const out=[], hoje=todayISO();
  DB.finance.filter(f=>f.tipo==='receita'&&f.status==='pendente'&&f.venc<hoje).forEach(f=>out.push({ico:'🔴',t:`<b>Recebimento atrasado:</b> ${esc(f.desc)} — ${fmt(f.valor)} (venceu ${fmtD(f.venc)})`}));
  DB.budgets.filter(b=>b.status==='pendente'&&b.validade&&daysDiff(hoje,b.validade)<=3&&daysDiff(hoje,b.validade)>=0).forEach(b=>{const c=DB.clients.find(x=>x.id===b.clienteId);out.push({ico:'⏳',t:`<b>Proposta vencendo:</b> ${esc(c?c.nome:'')} (${esc(b.tipo)}) — válida até ${fmtD(b.validade)}`})});
  DB.budgets.filter(b=>b.status==='pendente'&&b.validade&&b.validade<hoje).forEach(b=>{const c=DB.clients.find(x=>x.id===b.clienteId);out.push({ico:'⚠️',t:`<b>Proposta vencida:</b> ${esc(c?c.nome:'')} (${esc(b.tipo)}) — refaça contato ou atualize a validade`})});
  DB.events.filter(e=>e.status==='confirmado'&&daysDiff(hoje,e.data)>=0&&daysDiff(hoje,e.data)<=7&&e.checklist.some(c=>!c.ok)).forEach(e=>out.push({ico:'📝',t:`<b>Checklist pendente:</b> ${esc(e.titulo)} em ${daysDiff(hoje,e.data)} dia(s) — ${e.checklist.filter(c=>!c.ok).length} tarefa(s) aberta(s)`}));
  DB.budgets.map(b=>({b,c:calcBudget(b)})).filter(x=>x.b.status!=='recusado'&&x.c.margemReal<15).forEach(x=>{const cl=DB.clients.find(y=>y.id===x.b.clienteId);out.push({ico:'📉',t:`<b>Risco de prejuízo:</b> orçamento de ${esc(cl?cl.nome:'')} com margem de apenas ${fmtN(x.c.margemReal,1)}%`})});
  return out;
}

/* ================== DASHBOARD ================== */
PAGES.dashboard = () => {
  const hoje=todayISO(), d=new Date();
  const mes=hoje.slice(0,7);
  const evs=DB.events.filter(e=>e.status!=='cancelado');
  const evHoje=evs.filter(e=>e.data===hoje);
  const evSemana=evs.filter(e=>{const dd=daysDiff(hoje,e.data);return dd>=0&&dd<7});
  const evMes=evs.filter(e=>e.data.slice(0,7)===mes);
  const futuros=evs.filter(e=>e.data>=hoje&&e.status==='confirmado').sort((a,b)=>a.data.localeCompare(b.data));
  const rec=DB.finance.filter(f=>f.tipo==='receita');
  const recebido=rec.filter(f=>f.status==='recebido').reduce((s,f)=>s+f.valor,0);
  const previsto=rec.filter(f=>f.status==='pendente').reduce((s,f)=>s+f.valor,0);
  const atrasado=rec.filter(f=>f.status==='pendente'&&f.venc<hoje).reduce((s,f)=>s+f.valor,0);
  const despesas=DB.finance.filter(f=>f.tipo==='despesa'&&f.status!=='previsto').reduce((s,f)=>s+f.valor,0);
  const lucroPrev=DB.budgets.filter(b=>b.status==='aprovado').reduce((s,b)=>s+calcBudget(b).lucro,0);
  // gráfico: receita por mês (últimos 6)
  const meses=[]; for(let i=5;i>=0;i--){const m=new Date(d.getFullYear(),d.getMonth()-i,1);meses.push(isoLocal(m).slice(0,7));}
  const serie=meses.map(m=>({m, rec:rec.filter(f=>f.venc.slice(0,7)===m).reduce((s,f)=>s+f.valor,0)}));
  const maxV=Math.max(...serie.map(s=>s.rec),1);
  const al=alerts();
  return `
  <div class="grid g4 mb">
    <div class="card kpi"><div class="k-label">${icon('party')} Eventos hoje</div><div class="k-value">${evHoje.length}</div><div class="k-sub">${evSemana.length} nesta semana · ${evMes.length} no mês</div></div>
    <div class="card kpi"><div class="k-label">${icon('money')} Receita recebida</div><div class="k-value">${fmt(recebido)}</div><div class="k-sub">Prevista: <b>${fmt(previsto)}</b></div></div>
    <div class="card kpi"><div class="k-label">${icon('chart')} Lucro previsto (aprovados)</div><div class="k-value" style="color:var(--success)">${fmt(lucroPrev)}</div><div class="k-sub">Despesas pagas: ${fmt(despesas)}</div></div>
    <div class="card kpi"><div class="k-label">${icon('bell')} Em atraso</div><div class="k-value" style="color:${atrasado>0?'var(--danger)':'var(--text)'}">${fmt(atrasado)}</div><div class="k-sub">${rec.filter(f=>f.status==='pendente'&&f.venc<hoje).length} título(s) vencido(s)</div></div>
  </div>
  <div class="grid" style="grid-template-columns:1.6fr 1fr">
    <div class="card">
      <div class="card-head"><h3>Receitas por mês</h3><div class="legend"><span><i style="background:var(--primary-2)"></i>Realizado/Previsto</span><span><i style="background:var(--gold)"></i>Mês atual</span></div></div>
      <div class="card-pad"><div class="chart">${serie.map(s=>{const [y,m]=s.m.split('-');const lbl=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'][+m-1];
        return `<div class="bar-w"><div class="bar-val">${s.rec>0?'R$'+fmtN(s.rec/1000,1)+'k':''}</div><div class="bar ${s.m===mes?'gold':''}" style="height:${Math.max(s.rec/maxV*100,3)}%" title="${fmt(s.rec)}"></div><div class="bar-lbl">${lbl}</div></div>`;}).join('')}</div></div>
    </div>
    <div class="card">
      <div class="card-head"><h3>${icon('spark','width:15px;height:15px;stroke:var(--gold)')} Alertas inteligentes</h3><span class="badge ${al.length?'b-red':'b-green'}">${al.length||'ok'}</span></div>
      <div class="card-pad" style="max-height:230px;overflow-y:auto">${al.length?al.map(a=>`<div class="alert-row"><span class="a-ico">${a.ico}</span><span>${a.t}</span></div>`).join(''):'<div class="empty" style="padding:20px">✅ Tudo em dia. Nenhum alerta no momento.</div>'}</div>
    </div>
  </div>
  <div class="grid g2 mt">
    <div class="card">
      <div class="card-head"><h3>Próximos eventos</h3><button class="btn btn-ghost btn-sm" onclick="go('agenda')">Ver agenda</button></div>
      ${futuros.length?`<table><tbody>${futuros.slice(0,5).map(e=>`<tr onclick="openEvent('${e.id}')">
        <td style="width:66px"><div style="text-align:center;background:var(--gold-soft);border-radius:10px;padding:6px 4px"><div style="font-size:17px;font-weight:800;color:var(--warn)">${e.data.slice(8,10)}</div><div style="font-size:10px;font-weight:700;color:var(--warn)">${['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'][+e.data.slice(5,7)-1]}</div></div></td>
        <td><b>${esc(e.titulo)}</b><div class="muted">${e.hora} · ${e.pessoas} convidados · ${esc(e.local)}</div></td>
        <td class="right"><span class="badge b-green">confirmado</span><div class="muted mt" style="margin-top:6px">checklist ${e.checklist.filter(c=>c.ok).length}/${e.checklist.length}</div></td></tr>`).join('')}</tbody></table>`
      :'<div class="empty">Nenhum evento futuro confirmado.</div>'}
    </div>
    <div class="card">
      <div class="card-head"><h3>Orçamentos em aberto</h3><button class="btn btn-primary btn-sm" onclick="go('orcamentos');startWizard()">${icon('plus')} Novo</button></div>
      ${DB.budgets.filter(b=>b.status==='pendente'||b.status==='rascunho').length?`<table><tbody>${DB.budgets.filter(b=>b.status==='pendente'||b.status==='rascunho').map(b=>{const c=calcBudget(b),cli=DB.clients.find(x=>x.id===b.clienteId);
        return `<tr onclick="go('orcamentos');openBudget('${b.id}')"><td><b>${esc(cli?cli.nome:'')}</b><div class="muted">${esc(b.tipo)} · ${fmtD(b.data)}</div></td>
        <td class="right money">${fmt(c.preco)}</td><td class="right"><span class="badge ${STATUS_B[b.status][0]}">${STATUS_B[b.status][1]}</span></td></tr>`}).join('')}</tbody></table>`
      :'<div class="empty">Nenhum orçamento pendente. 🎉</div>'}
    </div>
  </div>`;
};

/* ================== AGENDA ================== */
let calRef = new Date(); let calView='mes';
PAGES.agenda = () => {
  const y=calRef.getFullYear(), m=calRef.getMonth();
  const nomeMes=calRef.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  let body='';
  if(calView==='mes'){
    const first=new Date(y,m,1), start=new Date(first); start.setDate(1-first.getDay());
    let cells='';
    for(let i=0;i<42;i++){
      const d=new Date(start); d.setDate(start.getDate()+i);
      const iso=isoLocal(d);
      const evd=DB.events.filter(e=>e.data===iso&&e.status!=='cancelado');
      cells+=`<div class="cal-cell ${d.getMonth()!==m?'other':''} ${iso===todayISO()?'today':''}" onclick="budgetFromDate('${iso}')" title="Clique para criar um orçamento em ${fmtD(iso)}">
        <span class="cal-num">${d.getDate()}</span>
        ${evd.map(e=>{const bb=DB.budgets.find(x=>x.id===e.budgetId);const por=bb&&bb.criadoPor?' · por '+bb.criadoPor.nome:'';return `<div class="cal-ev ${e.status==='realizado'?'gray':''}" onclick="event.stopPropagation();openEvent('${e.id}')" title="${esc(e.titulo+por)}">${e.hora} ${esc(e.titulo)}</div>`}).join('')}
      </div>`;
    }
    body=`<div class="card" style="overflow:hidden"><div class="cal-grid">
      ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div></div>`;
  } else {
    const hoje=todayISO();
    const range = calView==='dia' ? 0 : calView==='semana' ? 7 : 365;
    const list=DB.events.filter(e=>{const dd=daysDiff(hoje,e.data);return e.status!=='cancelado'&&dd>=0&&dd<=range}).sort((a,b)=>(a.data+a.hora).localeCompare(b.data+b.hora));
    body=`<div class="card">${list.length?`<table><tbody>${list.map(e=>`<tr onclick="openEvent('${e.id}')">
      <td style="width:110px"><b>${fmtD(e.data)}</b><div class="muted">${e.hora}</div></td>
      <td><b>${esc(e.titulo)}</b><div class="muted">${e.pessoas} convidados · ${esc(e.local)}</div></td>
      <td class="right"><span class="badge ${e.status==='realizado'?'b-gray':'b-green'}">${e.status}</span></td></tr>`).join('')}</tbody></table>`
      :`<div class="empty"><div class="e-ico">📅</div>Nenhum evento neste período.</div>`}</div>`;
  }
  return `
  <div class="spread mb">
    <div class="flex">
      <button class="icon-btn" onclick="calRef=new Date(calRef.getFullYear(),calRef.getMonth()-1,1);render()">${icon('left')}</button>
      <b style="font-size:15.5px;text-transform:capitalize;min-width:170px;text-align:center">${nomeMes}</b>
      <button class="icon-btn" onclick="calRef=new Date(calRef.getFullYear(),calRef.getMonth()+1,1);render()">${icon('right')}</button>
      <button class="btn btn-ghost btn-sm" onclick="calRef=new Date();render()">Hoje</button>
    </div>
    <div class="tabs">${[['dia','Dia'],['semana','Semana'],['mes','Mês'],['ano','Ano']].map(([v,l])=>`<button class="tab ${calView===v?'active':''}" onclick="calView='${v}';render()">${l}</button>`).join('')}</div>
  </div>${body}`;
};

/* novo orçamento a partir de um clique no dia do calendário */
function budgetFromDate(iso){
  go('orcamentos');
  startWizard();
  W.b.data = iso;
  render();
  toast('Novo orçamento para '+fmtD(iso)+' — preencha os dados.');
}

/* ================== EVENTO (drawer compartilhado) ================== */
function openEvent(id){
  const e=DB.events.find(x=>x.id===id); if(!e) return;
  const cli=DB.clients.find(x=>x.id===e.clienteId);
  const b=DB.budgets.find(x=>x.id===e.budgetId);
  const c=b?calcBudget(b):null;
  const tipoBuffet = b ? (DB.menus.find(m=>m.id===b.menuId)?.nome || '—') : '—';
  const fin=DB.finance.filter(f=>f.budgetId===e.budgetId&&f.tipo==='receita');
  const done=e.checklist.filter(x=>x.ok).length;
  openDrawer(`
    <div class="drawer-head"><div><h3>${esc(e.titulo)}</h3><div class="muted">${fmtD(e.data)} às ${e.hora}</div></div><button class="close-x" onclick="closeDrawer()">✕</button></div>
    <div class="drawer-body">
      <span class="badge ${e.status==='realizado'?'b-gray':'b-green'}">${e.status}</span>
      <div class="section-title">Evento</div>
      <div class="sumrow"><span>Nome do evento</span><b style="text-align:right;max-width:60%">${esc(e.titulo)}</b></div>
      <div class="sumrow"><span>Endereço</span><b style="text-align:right;max-width:60%">${esc(e.local)}</b></div>
      <div class="sumrow"><span>Telefone</span><b>${esc(cli?cli.tel:'—')}</b></div>
      <div class="sumrow"><span>Contratante</span><b>${esc(cli?cli.nome:'—')}</b></div>
      <div class="sumrow"><span>Tipo de buffet</span><b>${esc(tipoBuffet)}</b></div>
      <div class="sumrow"><span>Orçamento feito por</span><b>${esc(b&&b.criadoPor?b.criadoPor.nome:'—')}</b></div>
      <div class="sumrow"><span>Convidados</span><b>${e.pessoas}</b></div>
      <div class="section-title">Equipe escalada (${e.equipe.length})</div>
      ${e.equipe.map(id=>{const t=DB.team.find(x=>x.id===id);return t?`<div class="sumrow"><span class="flex"><span class="avatar-sm">${initials(t.nome)}</span>${esc(t.nome)}</span><b class="muted">${esc(t.funcao)} · ${fmt(t.diaria)}</b></div>`:''}).join('')||'<div class="muted">Nenhum funcionário escalado.</div>'}
      ${e.alugueis&&e.alugueis.length?`<div class="section-title">Equipamentos reservados</div>${e.alugueis.map(a=>{const r=DB.rentals.find(x=>x.id===a.id);return r?`<div class="sumrow"><span>${esc(r.item)}</span><b>${a.qtd} ${r.un} · ${fmt(r.ultimo*a.qtd)}</b></div>`:''}).join('')}`:''}
      ${c?`<div class="section-title">Financeiro</div>
      <div class="sumrow"><span>Valor do orçamento confirmado</span><b>${fmt(c.preco)}</b></div>
      ${fin.map(f=>`<div class="sumrow"><span>${esc(f.desc.split('—')[0])}</span><b style="color:${f.status==='recebido'?'var(--success)':f.venc<todayISO()?'var(--danger)':'var(--warn)'}">${fmt(f.valor)} · ${f.status==='recebido'?'recebido':f.venc<todayISO()?'atrasado':'a receber'}</b></div>`).join('')}
      <div class="sumrow"><span>Lucro estimado</span><b style="color:var(--success)">${fmt(c.lucro)} (${fmtN(c.margemReal,0)}%)</b></div>`:''}
      <div class="section-title">Checklist operacional</div>
      <div class="spread mb"><div class="progressbar" style="flex:1"><div style="width:${e.checklist.length?done/e.checklist.length*100:0}%"></div></div><span class="muted">${done}/${e.checklist.length}</span></div>
      ${e.checklist.map((cItem,i)=>`<div class="checklist-item ${cItem.ok?'done':''}"><input type="checkbox" ${cItem.ok?'checked':''} onchange="toggleCheck('${e.id}',${i})"><span>${esc(cItem.t)}</span><button class="checklist-del" title="Remover item" onclick="removeCheck('${e.id}',${i})">${icon('trash')}</button></div>`).join('')||'<div class="muted">Nenhum item no checklist.</div>'}
      <div class="checklist-add">
        <input id="newCheckItem" placeholder="Adicionar item ao checklist…" onkeydown="if(event.key==='Enter')addCheck('${e.id}')">
        <button class="btn btn-ghost btn-sm" onclick="addCheck('${e.id}')">${icon('plus')} Adicionar</button>
      </div>
      ${e.obs?`<div class="section-title">Observações</div><div class="muted">${esc(e.obs)}</div>`:''}
    </div>
    <div class="drawer-foot">
      ${e.status==='confirmado'?`<button class="btn btn-ghost btn-sm" onclick="finishEvent('${e.id}')">${icon('check')} Marcar como realizado</button>`:''}
    </div>`);
}
function toggleCheck(evId,i){ const e=DB.events.find(x=>x.id===evId); if(!e)return; e.checklist[i].ok=!e.checklist[i].ok; save(); openEvent(evId); }
function addCheck(evId){
  const e=DB.events.find(x=>x.id===evId); if(!e)return;
  const inp=document.getElementById('newCheckItem'); const txt=inp.value.trim();
  if(!txt){ toast('Digite o texto do item.'); return; }
  e.checklist.push({t:txt, ok:false}); save(); openEvent(evId);
}
function removeCheck(evId,i){
  const e=DB.events.find(x=>x.id===evId); if(!e)return;
  e.checklist.splice(i,1); save(); openEvent(evId);
}
function finishEvent(id){ const e=DB.events.find(x=>x.id===id); if(!e)return; e.status='realizado'; save(); closeDrawer(); render(); toast('Evento marcado como realizado.'); }

/* ================== EVENTOS (lista) ================== */
PAGES.eventos = () => {
  const list=[...DB.events].sort((a,b)=>b.data.localeCompare(a.data));
  return `<div class="muted mb">Eventos são criados automaticamente na aprovação de um orçamento.</div>
  <div class="card">${list.length?`<table><thead><tr><th>Evento</th><th>Data</th><th class="right">Convidados</th><th class="right">Equipe</th><th class="right">Checklist</th><th>Status</th></tr></thead><tbody>
    ${list.map(e=>{const done=e.checklist.filter(c=>c.ok).length;return `<tr onclick="openEvent('${e.id}')">
    <td><b>${esc(e.titulo)}</b><div class="muted">${esc(e.local)}</div></td>
    <td>${fmtD(e.data)} · ${e.hora}</td><td class="right">${e.pessoas}</td><td class="right">${e.equipe.length}</td>
    <td class="right"><div class="flex" style="justify-content:flex-end"><div class="progressbar" style="width:70px"><div style="width:${e.checklist.length?done/e.checklist.length*100:0}%"></div></div><span class="muted">${done}/${e.checklist.length}</span></div></td>
    <td><span class="badge ${e.status==='realizado'?'b-gray':'b-green'}">${e.status}</span></td></tr>`}).join('')}</tbody></table>`
  :`<div class="empty"><div class="e-ico">🎉</div>Nenhum evento ainda. Aprove um orçamento para criar o primeiro.</div>`}</div>`;
};
</script>
<script>
/* ================== CLIENTES ================== */
let cliBusca='';
PAGES.clientes = () => {
  const list=DB.clients.filter(c=>!cliBusca||c.nome.toLowerCase().includes(cliBusca.toLowerCase()));
  return `<div class="spread mb">
    <div class="searchbox">${icon('search')}<input placeholder="Buscar cliente…" value="${esc(cliBusca)}" oninput="cliBusca=this.value;render();setTimeout(()=>{const i=document.querySelector('.searchbox input');i.focus();i.setSelectionRange(i.value.length,i.value.length)},0)"></div>

  <div class="card"><table><thead><tr><th>Cliente</th><th>Contato</th><th class="right">Eventos</th><th class="right">Total contratado</th><th></th></tr></thead><tbody>
  ${list.map(cl=>{
    const buds=DB.budgets.filter(b=>b.clienteId===cl.id&&b.status==='aprovado');

      <td>${esc(cl.tel)}<div class="muted">${esc(cl.email)}</div></td>
      <td class="right">${buds.length?`<span class="badge ${buds.length>1?'b-gold':'b-blue'}">${buds.length} ${buds.length>1?'· recorrente':''}</span>`:'<span class="muted">—</span>'}</td>
      <td class="right money">${fmt(total)}</td>
      <td class="right"><button class="icon-btn" style="width:30px;height:30px" title="Excluir cliente" onclick="event.stopPropagation();askDelClient('${cl.id}')">${icon('trash')}</button></td></tr>`}).join('')||`<tr><td colspan="5"><div class="empty">Nenhum cliente encontrado.</div></td></tr>`}

/* ================== FINANCEIRO ================== */
let finTab='todos';
PAGES.financeiro = () => {
  const hoje=todayISO();
  const rec=DB.finance.filter(f=>f.tipo==='receita');
  const desp=DB.finance.filter(f=>f.tipo==='despesa');
  const recebido=rec.filter(f=>f.status==='recebido').reduce((s,f)=>s+f.valor,0);
  const aReceber=rec.filter(f=>f.status==='pendente').reduce((s,f)=>s+f.valor,0);
  const atrasado=rec.filter(f=>f.status==='pendente'&&f.venc<hoje).reduce((s,f)=>s+f.valor,0);
  const pago=desp.filter(f=>f.status==='pago').reduce((s,f)=>s+f.valor,0);
  const saldo=recebido-pago;
  let list=[...DB.finance].sort((a,b)=>b.venc.localeCompare(a.venc));
  if(finTab==='receitas') list=list.filter(f=>f.tipo==='receita');
  if(finTab==='despesas') list=list.filter(f=>f.tipo==='despesa');
  if(finTab==='atrasados') list=list.filter(f=>f.tipo==='receita'&&f.status==='pendente'&&f.venc<hoje);
  const stBadge=f=>{
    if(f.tipo==='receita') return f.status==='recebido'?'<span class="badge b-green">recebido</span>':f.venc<hoje?'<span class="badge b-red">atrasado</span>':'<span class="badge b-gold">a receber</span>';
    return f.status==='pago'?'<span class="badge b-gray">pago</span>':f.status==='previsto'?'<span class="badge b-blue">previsto</span>':'<span class="badge b-gold">a pagar</span>';
  };
  return `
  <div class="grid g4 mb">
    <div class="card kpi"><div class="k-label">${icon('money')} Saldo (caixa)</div><div class="k-value" style="color:${saldo>=0?'var(--success)':'var(--danger)'}">${fmt(saldo)}</div><div class="k-sub">Recebido − despesas pagas</div></div>
    <div class="card kpi"><div class="k-label">${icon('chart')} A receber</div><div class="k-value">${fmt(aReceber)}</div><div class="k-sub">${rec.filter(f=>f.status==='pendente').length} título(s)</div></div>
    <div class="card kpi"><div class="k-label">${icon('bell')} Atrasado</div><div class="k-value" style="color:${atrasado>0?'var(--danger)':'var(--text)'}">${fmt(atrasado)}</div><div class="k-sub">Cobrar clientes</div></div>
    <div class="card kpi"><div class="k-label">${icon('box')} Despesas pagas</div><div class="k-value">${fmt(pago)}</div><div class="k-sub">Previstas: ${fmt(desp.filter(f=>f.status==='previsto').reduce((s,f)=>s+f.valor,0))}</div></div>
  </div>
  <div class="spread mb">
    <div class="tabs">${[['todos','Todos'],['receitas','Receitas'],['despesas','Despesas'],['atrasados','Atrasados']].map(([v,l])=>`<button class="tab ${finTab===v?'active':''}" onclick="finTab='${v}';render()">${l}</button>`).join('')}</div>
    <button class="btn btn-primary" onclick="finForm()">${icon('plus')} Novo lançamento</button>
  </div>
  <div class="card"><table><thead><tr><th>Descrição</th><th>Categoria</th><th>Vencimento</th><th class="right">Valor</th><th>Status</th><th></th></tr></thead><tbody>
  ${list.map(f=>`<tr style="cursor:default">
    <td><b>${esc(f.desc)}</b></td><td class="muted">${esc(f.cat||'—')}</td><td>${fmtD(f.venc)}</td>
    <td class="right money" style="color:${f.tipo==='receita'?'var(--success)':'var(--danger)'}">${f.tipo==='receita'?'+':'−'} ${fmt(f.valor)}</td>
    <td>${stBadge(f)}</td>
    <td class="right"><div class="flex" style="justify-content:flex-end">${f.status==='pendente'?`<button class="btn btn-ghost btn-sm" onclick="markPaid('${f.id}')">${icon('check')} ${f.tipo==='receita'?'Receber':'Pagar'}</button>`:''}<button class="icon-btn" style="width:30px;height:30px" title="Excluir lançamento" onclick="askDelFin('${f.id}')">${icon('trash')}</button></div></td>
  </tr>`).join('')||`<tr><td colspan="6"><div class="empty">Nenhum lançamento neste filtro.</div></td></tr>`}
  </tbody></table></div>`;
};
function markPaid(id){
  const f=DB.finance.find(x=>x.id===id); if(!f)return;
  f.status=f.tipo==='receita'?'recebido':'pago'; f.recebidoEm=todayISO();
  save(); render(); toast(f.tipo==='receita'?'Recebimento confirmado!':'Pagamento registrado.');

  const f=DB.finance.find(x=>x.id===id); if(!f)return;
  confirmDel(`Excluir o lançamento <b>${esc(f.desc)}</b> (${fmt(f.valor)})?`, ()=>{

    DB.menus=DB.menus.filter(x=>x.id!==id); save(); closeDrawer(); render(); toast('Cardápio excluído.');
  });
}

/* ================== MONTAGEM DO CARDÁPIO (seções dinâmicas com flag incluir/excluir) ================== */
function dishForm(id){
  const m=DB.menus.find(x=>x.id===id); if(!m)return;
  if(!m.pratos) m.pratos=[];
  if(!m.secoesList) m.secoesList=[{nome:'Escolha das Carnes',ativo:true},{nome:'Entrada',ativo:true},{nome:'Prato Principal',ativo:true},{nome:'Sobremesa',ativo:true}];
  openDrawer(`
    <div class="drawer-head"><div><h3>Montar cardápio</h3><div class="muted">Título geral: ${esc(m.nome)}</div></div><button class="close-x" onclick="closeDrawer()">✕</button></div>
    <div class="drawer-body">
      <div class="muted mb" style="font-size:12.5px">Marque ✓ os tópicos que esse cardápio vai ter e inclua o que entra em cada um. Só os tópicos marcados saem na proposta em PDF. Tudo fica salvo automaticamente.</div>
      ${m.secoesList.map((sec,si)=>{
        const lista=m.pratos.map((p,i)=>({...p,i})).filter(p=>p.cat===sec.nome);
        return `
        <div style="border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;${sec.ativo?'':'opacity:.55'}">
          <div class="spread">
            <label style="display:flex;align-items:center;gap:9px;cursor:pointer;text-transform:none;letter-spacing:0;margin:0">
              <input type="checkbox" ${sec.ativo?'checked':''} onchange="toggleSecao('${m.id}',${si})" style="width:17px;height:17px;accent-color:var(--primary-2)">
              <b style="font-size:13.5px;color:var(--primary)">${esc(sec.nome)}</b>
            </label>
            <button class="checklist-del" title="Excluir tópico" onclick="removeSecao('${m.id}',${si})">${icon('trash')}</button>
          </div>
          ${sec.ativo?`
          <div class="mt">
            ${lista.length?lista.map(p=>`<div class="checklist-item"><span><b>${esc(p.nome)}</b>${p.desc?` — <span class="muted">${esc(p.desc)}</span>`:''}</span><button class="checklist-del" title="Excluir" onclick="removeDish('${m.id}',${p.i})">${icon('trash')}</button></div>`).join('')
              :'<div class="muted" style="font-size:12.5px;padding:2px 0">Nada incluso ainda neste tópico.</div>'}
            <div class="frow mt">
              <input id="nd_nome_${si}" placeholder="Ex.: ${sec.nome==='Escolha das Carnes'?'Picanha':sec.nome==='Sobremesa'?'Pudim de leite':'Bolinho de linguiça'}" onkeydown="if(event.key==='Enter')addDish('${m.id}',${si})">
              <input id="nd_desc_${si}" placeholder="Descrição (opcional)" onkeydown="if(event.key==='Enter')addDish('${m.id}',${si})">
            </div>
            <button class="btn btn-ghost btn-sm mt" onclick="addDish('${m.id}',${si})">${icon('plus')} Incluir</button>
          </div>`:''}
        </div>`;
      }).join('')}
      <div class="flex mt">
        <input id="novaSecao" placeholder="Novo tópico (ex.: Bebidas, Caldo especial…)" onkeydown="if(event.key==='Enter')addSecao('${m.id}')">
        <button class="btn btn-ghost btn-sm" onclick="addSecao('${m.id}')">${icon('plus')} Criar tópico</button>
      </div>
      <div class="section-title">Investimento (tabela de preços da proposta)</div>
      <div class="field"><label>Descrição do serviço</label><input value="${esc(m.horas||'')}" onchange="cfgMenu('${m.id}','horas',this.value)" placeholder="Ex.: 4 horas de serviço de buffet"></div>
      ${(m.precos||[]).map((p,pi)=>`<div class="checklist-item"><span><b>${esc(p.faixa)}</b> — <span class="muted">${fmt(p.valor)} por pessoa</span></span><button class="checklist-del" onclick="removePreco('${m.id}',${pi})">${icon('trash')}</button></div>`).join('')||'<div class="muted" style="font-size:12.5px">Nenhuma faixa cadastrada. Ex.: "De 15 a 29 adultos" — R$ 155.</div>'}
      <div class="frow mt">
        <input id="np_faixa" placeholder="Faixa (ex.: De 15 a 29 Adultos)">
        <input id="np_valor" type="number" min="0" step="5" placeholder="Valor por pessoa (R$)">
      </div>
      <button class="btn btn-ghost btn-sm mt" onclick="addPreco('${m.id}')">${icon('plus')} Incluir faixa de preço</button>
      <div class="section-title">Fotos da proposta (opcional)</div>
      <div class="muted mb" style="font-size:12px">Cole o endereço (URL) de fotos suas hospedadas na internet — ex.: do Instagram ou Google Fotos. Se deixar em branco, a proposta sai sem fotos, no mesmo layout.</div>
      <div class="field"><label>Foto da capa (URL)</label><input value="${esc(m.fotoCapa||'')}" onchange="cfgMenu('${m.id}','fotoCapa',this.value.trim())" placeholder="https://…"></div>
      <div class="field"><label>Fotos do menu — até 3 URLs separadas por vírgula</label><input value="${esc(m.fotosMenu||'')}" onchange="cfgMenu('${m.id}','fotosMenu',this.value)" placeholder="https://…, https://…, https://…"></div>
    </div>
    <div class="drawer-foot"><button class="btn btn-gold" onclick="printMenu('${m.id}')">${icon('print')} Pré-visualizar proposta</button></div>`);
}
function toggleSecao(menuId, si){ const m=DB.menus.find(x=>x.id===menuId); if(!m)return; m.secoesList[si].ativo=!m.secoesList[si].ativo; save(); dishForm(menuId); }
function addSecao(menuId){
  const m=DB.menus.find(x=>x.id===menuId); if(!m)return;
  const nome=document.getElementById('novaSecao').value.trim();
  if(!nome){ toast('Digite o nome do tópico.'); return; }
  if(m.secoesList.some(s=>s.nome.toLowerCase()===nome.toLowerCase())){ toast('Esse tópico já existe.'); return; }
  m.secoesList.push({nome, ativo:true}); save(); dishForm(menuId);
}
function removeSecao(menuId, si){
  const m=DB.menus.find(x=>x.id===menuId); if(!m)return;
  const sec=m.secoesList[si];
  m.pratos=m.pratos.filter(p=>p.cat!==sec.nome);
  m.secoesList.splice(si,1); save(); dishForm(menuId); toast(`Tópico "${sec.nome}" excluído.`);
}
function addDish(menuId, si){
  const m=DB.menus.find(x=>x.id===menuId); if(!m)return;
  const sec=m.secoesList[si]; if(!sec)return;
  const nome=document.getElementById('nd_nome_'+si).value.trim();
  const desc=document.getElementById('nd_desc_'+si).value.trim();
  if(!nome){ toast('Digite o nome do item.'); return; }
  m.pratos.push({cat:sec.nome, nome, desc});
  save(); dishForm(menuId);
}
function removeDish(menuId, idx){ const m=DB.menus.find(x=>x.id===menuId); if(!m)return; m.pratos.splice(idx,1); save(); dishForm(menuId); }
function cfgMenu(menuId, campo, val){ const m=DB.menus.find(x=>x.id===menuId); if(!m)return; m[campo]=val; save(); toast('Salvo.'); }
function addPreco(menuId){
  const m=DB.menus.find(x=>x.id===menuId); if(!m)return;
  const faixa=document.getElementById('np_faixa').value.trim(), valor=+document.getElementById('np_valor').value;
  if(!faixa||!valor){ toast('Informe a faixa e o valor.'); return; }
  m.precos.push({faixa, valor}); save(); dishForm(menuId);
}
function removePreco(menuId, pi){ const m=DB.menus.find(x=>x.id===menuId); if(!m)return; m.precos.splice(pi,1); save(); dishForm(menuId); }

function saveContrato(id){
  const titulo=document.getElementById('ct_titulo').value.trim();
  const texto=document.getElementById('ct_texto').value;
  if(!titulo||!texto.trim()){ toast('Informe título e texto.'); return; }
  if(id){ const ct=DB.contratos.find(x=>x.id===id); ct.titulo=titulo; ct.texto=texto; }
  else DB.contratos.push({id:uid(), titulo, texto, criado:todayISO()});
  save(); closeDrawer(); render(); toast('Contrato salvo.');
}
function askDelContrato(id){
  const ct=DB.contratos.find(x=>x.id===id); if(!ct)return;
  confirmDel(`Excluir o modelo de contrato <b>${esc(ct.titulo)}</b>?`, ()=>{
    DB.contratos=DB.contratos.filter(x=>x.id!==id); save(); closeDrawer(); render(); toast('Contrato excluído.');
  });
}
function genContrato(id){

function printContrato(ctId, budgetId){
  const ct=DB.contratos.find(x=>x.id===ctId); if(!ct)return;
  let texto=ct.texto;
  const hoje=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const vals={CONTRATANTE:'____________________________', CPF_CNPJ:'____________________', TELEFONE:'____________________', TIPO_EVENTO:'____________________', DATA_EVENTO:'____/____/______', HORARIO:'____:____', LOCAL_EVENTO:'____________________________', CONVIDADOS:'________', CARDAPIO:'____________________', VALOR_TOTAL:'R$ ____________', SINAL:'R$ ____________', FORMA_PAGAMENTO:'PIX ou cartão de crédito', CIDADE_DATA:'______________________, '+hoje};
  if(budgetId){
    const b=DB.budgets.find(x=>x.id===budgetId);
    if(b){
      const cli=DB.clients.find(x=>x.id===b.clienteId), c=calcBudget(b);
      Object.assign(vals,{
        CONTRATANTE:cli?cli.nome:vals.CONTRATANTE, CPF_CNPJ:cli&&cli.doc!=='—'?cli.doc:vals.CPF_CNPJ, TELEFONE:cli?cli.tel:vals.TELEFONE,
        TIPO_EVENTO:b.tipo, DATA_EVENTO:fmtD(b.data), HORARIO:b.hora, LOCAL_EVENTO:b.local, CONVIDADOS:String(b.pessoas),
        CARDAPIO:DB.menus.find(m=>m.id===b.menuId)?.nome||'—', VALOR_TOTAL:fmt(c.preco), SINAL:fmt(c.preco*DB.cfg.sinalPct/100)+` (${DB.cfg.sinalPct}%)`,
        FORMA_PAGAMENTO:b.pagamento, CIDADE_DATA:'______________________, '+hoje
      });
    }
  }

function priceSearch(id){
  const i=DB.ingredients.find(x=>x.id===id); if(!i)return;
  const q=encodeURIComponent('preço '+i.nome+' '+(i.un==='kg'?'kg ':'')+(DB.cfg.regiao||''));
  window.open('https://www.google.com/search?tbm=shop&q='+q, '_blank');
  toast('Pesquisa aberta em nova aba — confira os preços da sua região e atualize os valores aqui.');
}
function addIngrediente(){
  const g=x=>document.getElementById(x).value;
  const nome=g('ni_nome').trim(), un=g('ni_un').trim()||'un', cat=g('ni_cat').trim()||'Outros';
  const pp=+g('ni_pp')||0, pMin=+g('ni_pmin')||0, pMed=+g('ni_pmed')||0, pMax=+g('ni_pmax')||0;
  if(!nome){ toast('Informe o nome do ingrediente.'); return; }
  if(!pp){ toast('Informe a quantidade por pessoa.'); return; }
  DB.ingredients.push({id:uid(), nome, un, pp, pMin:pMin||pMed, pMed:pMed||pMin, pMax:pMax||pMed||pMin, cat});
  save(); render(); toast('Ingrediente adicionado à base de estimativas.');
}
function askDelIngrediente(id){
  const i=DB.ingredients.find(x=>x.id===id); if(!i)return;
  const emMenus=DB.menus.filter(m=>m.itens.includes(id)).length;
  confirmDel(`Excluir <b>${esc(i.nome)}</b> da base de estimativas?${emMenus?` Ele será removido de ${emMenus} cardápio(s).`:''}`, ()=>{
    DB.ingredients=DB.ingredients.filter(x=>x.id!==id);
    DB.menus.forEach(m=>{ m.itens=m.itens.filter(x=>x!==id); });
    save(); closeDrawer(); render(); toast('Ingrediente excluído.');
  });
}
function cfgIng(id,campo,val){ const i=DB.ingredients.find(x=>x.id===id); if(!i)return; i[campo]=+val||0; save(); toast('Base de estimativa atualizada.'); }
function cfgEmp(campo,val){ DB.cfg.empresa[campo]=val; save(); toast('Dados da empresa atualizados.'); }

function saveMyData(){
  const nome=document.getElementById('ac_nome').value.trim();
  const usuario=document.getElementById('ac_usuario').value.trim();
  if(!nome||!usuario){ toast('Nome e usuário não podem ficar em branco.'); return; }
  const dup=DB.users.find(x=>x.usuario.toLowerCase()===usuario.toLowerCase() && x.id!==SESSION.id);
  if(dup){ toast('Já existe outro usuário com esse login.'); return; }
  SESSION.nome=nome; SESSION.usuario=usuario; save();
  acctMsg='Dados atualizados com sucesso.';
  toast('Seus dados foram atualizados.');
  render();
}
function saveMyPassword(){
  const atual=document.getElementById('ac_atual').value;
  const n1=document.getElementById('ac_nova1').value, n2=document.getElementById('ac_nova2').value;
  const msg=document.getElementById('acctPassMsg');
  const err=t=>{ msg.innerHTML=`<div class="login-err">${esc(t)}</div>`; };
  if(atual!==SESSION.senha){ err('Senha atual incorreta.'); return; }
  if(n1.length<4){ err('A nova senha deve ter ao menos 4 caracteres.'); return; }
  if(n1!==n2){ err('As senhas não coincidem.'); return; }
  SESSION.senha=n1; save();
  msg.innerHTML=`<div class="login-ok">Senha atualizada com sucesso.</div>`;
  document.getElementById('ac_atual').value=''; document.getElementById('ac_nova1').value=''; document.getElementById('ac_nova2').value='';
  toast('Sua senha foi atualizada.');
}
function saveMySecurity(){
  const pergunta=document.getElementById('ac_pergunta').value.trim();
  const resposta=document.getElementById('ac_resposta').value.trim();
  const msg=document.getElementById('acctSecMsg');
  if(!pergunta||!resposta){ msg.innerHTML=`<div class="login-err">Preencha a pergunta e a resposta.</div>`; return; }
  SESSION.perguntaSeg=pergunta; SESSION.respostaSeg=resposta; save();
  msg.innerHTML=`<div class="login-ok">Pergunta de segurança salva.</div>`;
  toast('Pergunta de segurança atualizada.');
}

function resetPasswordForm(id){

function adminResetPassword(id){
  if(!isAdmin()){ toast('Apenas administradores podem redefinir senhas.'); return; }
  const u=DB.users.find(x=>x.id===id); if(!u)return;
  const msg=document.getElementById('rpMsg');
  const n1=document.getElementById('rp_nova1').value, n2=document.getElementById('rp_nova2').value;
  if(n1.length<4){ msg.innerHTML=`<div class="login-err">A nova senha deve ter ao menos 4 caracteres.</div>`; return; }

  save(); closeDrawer(); render();
  toast(`Senha de ${u.nome} redefinida com sucesso.`);
}
function userForm(id){
  if(!isAdmin()){ toast('Apenas administradores podem cadastrar usuários.'); return; }
  const u = id?DB.users.find(x=>x.id===id):{nome:'',usuario:'',senha:'',papel:'Comercial',perguntaSeg:'',respostaSeg:''};
  const isSelf = id && SESSION.id===id;
  openDrawer(`
    <div class="drawer-head"><h3>${id?'Editar':'Novo'} usuário</h3><button class="close-x" onclick="closeDrawer()">✕</button></div>
